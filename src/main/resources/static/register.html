<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrarse — Prode Mundial 2026</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
<div class="auth-box">
  <div class="auth-logo">⚽</div>
  <h1 class="auth-title">Crear cuenta</h1>
  <p class="auth-sub">Registrate y participá en el Prode 2026</p>

  <div id="errorMsg" class="alert alert-danger" style="display:none"></div>

  <div class="form-group">
    <label>Nombre completo</label>
    <input type="text" id="name" placeholder="Juan García" autofocus>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com">
  </div>
  <div class="form-group">
    <label>Contraseña <span style="color:#999;font-size:12px">(mínimo 6 caracteres)</span></label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <div class="form-group">
    <label>Repetir contraseña</label>
    <input type="password" id="confirm" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()">
  </div>
  <button class="btn btn-green btn-block" id="regBtn" onclick="doRegister()">Crear cuenta</button>
  <p class="auth-link">¿Ya tenés cuenta? <a href="/login.html">Iniciá sesión</a></p>
</div>

<script src="/js/api.js"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = '/index.html';

  async function doRegister() {
    const btn = document.getElementById('regBtn');
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';

    if (!name || !email || !password) { showErr('Completá todos los campos.'); return; }
    if (password.length < 6) { showErr('La contraseña debe tener al menos 6 caracteres.'); return; }
    if (password !== confirm) { showErr('Las contraseñas no coinciden.'); return; }

    btn.disabled = true; btn.textContent = 'Creando cuenta...';
    try {
      const data = await api.post('/api/auth/register', { name, email, password });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify({ id: data.userId, name: data.name, email: data.email, admin: data.admin }));
      window.location.href = '/index.html';
    } catch(e) {
      showErr(e.message || 'Error al registrar.');
      btn.disabled = false; btn.textContent = 'Crear cuenta';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
