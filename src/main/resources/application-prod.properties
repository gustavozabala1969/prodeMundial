# =============================================
# Perfil PRODUCCIÓN — Render.com
# Las variables ${...} se leen desde el
# dashboard de Render → Environment
# =============================================

# Base de datos (variables de entorno en Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Servidor — Render asigna el puerto via variable PORT
server.port=${PORT:8080}

# Reducir logs en producción
logging.level.root=WARN
logging.level.com.prode=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Pool de conexiones optimizado para plan free
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
