# Base de datos MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/mundial2026?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
# spring.datasource.username=gustavozabala
# spring.datasource.password=123
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=${PORT:8080}
server.servlet.context-path=/

# JWT
jwt.secret=ProdeM1nd1al2026SecretKeyMuyLargaParaHS256AlgorithmSeguridad!
jwt.expiration=86400000

# Archivos estáticos
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Logs
logging.level.com.prode=INFO
logging.level.org.springframework.security=WARN
